name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile entrypoints
        run: python3 -m py_compile run-task.py session_registry.py
